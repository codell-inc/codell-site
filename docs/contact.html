<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Codellへのお問い合わせ。現場の違和感やKiDUKiに関する無料相談はこちらから。"
    />
    <title>お問い合わせ | Codell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  </head>
  <body class="page-contact">
    <header class="site-header" data-header>
      <a class="brand" href="./index.html" aria-label="Codell トップへ">
        <img class="brand-logo" src="./assets/codell-logo.svg" alt="Codell" width="144" height="60" />
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-nav-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" id="site-nav" data-nav>
        <a href="./index.html#business">事業</a>
        <a href="./index.html#work">業務内容</a>
        <a href="./index.html#product">制作物</a>
        <a href="./index.html#development-flow">開発の流れ</a>
        <a href="./index.html#company">会社概要</a>
        <a class="nav-contact" href="./contact.html">無料相談</a>
      </nav>
    </header>

    <main id="top">
      <section class="contact-page">
        <div class="contact-page-head">
          <p class="eyebrow">Contact</p>
          <h1>お問い合わせ</h1>
          <p class="lead">
            現場の違和感、KiDUKiへの関心、新しいプロダクト化の相談などをお寄せください。
            まずは無料相談として、内容を確認のうえ担当者よりご連絡いたします。
          </p>
          <dl class="contact-meta light">
            <div><dt>Email</dt><dd>codell.support@gmail.com</dd></div>
            <div><dt>Address</dt><dd>徳島県名西郡神山町神領大埜地299-1</dd></div>
          </dl>
        </div>

        <form class="contact-form light" id="contact-form" novalidate>
          <div class="field">
            <label for="contact-name">お名前 <span aria-hidden="true">*</span></label>
            <input type="text" id="contact-name" name="name" autocomplete="name" required />
          </div>
          <div class="field">
            <label for="contact-email">メールアドレス <span aria-hidden="true">*</span></label>
            <input type="email" id="contact-email" name="email" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="contact-type">問い合わせ種別 <span aria-hidden="true">*</span></label>
            <select id="contact-type" name="type" required>
              <option value="" disabled selected>選択してください</option>
              <option value="無料相談">無料相談</option>
              <option value="KiDUKiについて">KiDUKiについて</option>
              <option value="プロダクト開発相談">プロダクト開発相談</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="field">
            <label for="contact-message">問い合わせ内容 <span aria-hidden="true">*</span></label>
            <textarea id="contact-message" name="message" rows="6" required></textarea>
          </div>
          <div class="form-foot">
            <p class="form-status" id="contact-status" role="status" aria-live="polite"></p>
            <button type="submit" class="button primary" id="contact-submit">送信する</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <a class="brand" href="./index.html" aria-label="Codell トップへ">
        <img class="brand-logo" src="./assets/codell-logo.svg" alt="Codell" width="144" height="60" />
      </a>
      <small>&copy; 2026 Codell. All rights reserved.</small>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
